<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instructors · AttendU</title>

    <!-- Base + Layout -->
    <link rel="stylesheet" href="assets/css/base/reset.css" />
    <link rel="stylesheet" href="assets/css/base/variables.css" />
    <link rel="stylesheet" href="assets/css/base/typography.css" />
    <link rel="stylesheet" href="assets/css/layout/layout.css" />
    <link rel="stylesheet" href="assets/css/layout/sidebar.css" />
    <link rel="stylesheet" href="assets/css/layout/navbar.css" />

    <!-- Components -->
    <link rel="stylesheet" href="assets/css/components/buttons.css" />
    <link rel="stylesheet" href="assets/css/components/forms.css" />
    <link rel="stylesheet" href="assets/css/components/toast.css" />
    <link rel="stylesheet" href="assets/css/components/loader.css" />
    <link rel="stylesheet" href="assets/css/components/tables.css" />
    <link rel="stylesheet" href="assets/css/components/pagination.css" />
    <link rel="stylesheet" href="assets/css/components/modals.css" />
    <link rel="stylesheet" href="assets/css/components/badges.css" />

    <!-- Shared page styles (toolbar) -->
    <link rel="stylesheet" href="assets/css/pages/courses-groups.css" />

    <!-- Page-specific -->
    <link rel="stylesheet" href="assets/css/pages/users.css" />
</head>
<body>

    <div class="app-shell">
        <div id="sidebar"></div>

        <div class="app-main">
            <div id="navbar"></div>

            <div class="app-content">
                <div class="users-page-header">
                    <h1>Instructors</h1>
                    <button class="btn btn-primary" id="add-user-btn">+ Add Instructor</button>
                </div>

                <div class="users-toolbar">
                    <div class="users-search-wrap">
                        <input type="text" class="form-input" id="search-users" placeholder="Search by name or email…" />
                        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="9" r="7" />
                            <path d="M14 14L19 19" />
                        </svg>
                    </div>
                </div>

                <div id="users-table-container"></div>
                <div id="users-pagination-container"></div>
            </div>
        </div>
    </div>

    <!-- ====== MODALS ====== -->

    <!-- Add Instructor Modal (no edit for simplicity) -->
    <div id="user-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-lg">
            <div class="modal-header">
                <h2 class="modal-title" id="user-modal-title">Add Instructor</h2>
                <button class="modal-close" data-modal-close>&times;</button>
            </div>
            <div class="modal-body">
                <form id="user-form" novalidate>
                    <div class="user-form-grid">
                        <div class="form-group">
                            <label class="form-label" for="user-first-name">First Name <span class="text-muted">*</span></label>
                            <input type="text" class="form-input" id="user-first-name" placeholder="First name" required />
                            <div class="form-error" id="user-first-name-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="user-last-name">Last Name <span class="text-muted">*</span></label>
                            <input type="text" class="form-input" id="user-last-name" placeholder="Last name" required />
                            <div class="form-error" id="user-last-name-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="user-email">Email <span class="text-muted">*</span></label>
                            <input type="email" class="form-input" id="user-email" placeholder="instructor@example.com" required />
                            <div class="form-error" id="user-email-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="user-phone">Phone</label>
                            <input type="tel" class="form-input" id="user-phone" placeholder="Phone number" />
                            <div class="form-error" id="user-phone-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="user-gender">Gender</label>
                            <select class="form-select" id="user-gender">
                                <option value="">Select</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                            <div class="form-error" id="user-gender-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="user-password">Password <span class="text-muted">*</span></label>
                            <input type="password" class="form-input" id="user-password" placeholder="Min 6 characters" required />
                            <div class="form-error" id="user-password-error"></div>
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label" for="user-password-confirm">Confirm Password <span class="text-muted">*</span></label>
                            <input type="password" class="form-input" id="user-password-confirm" placeholder="Confirm password" required />
                            <div class="form-error" id="user-password-confirm-error"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-primary" id="user-save-btn">Create Instructor</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-user-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-sm">
            <div class="modal-header">
                <h2 class="modal-title">Delete Instructor</h2>
                <button class="modal-close" data-modal-close>&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete instructor <strong id="delete-user-name"></strong>?</p>
                <p class="text-muted" style="font-size:0.9rem;">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-danger" id="confirm-delete-user">Delete</button>
            </div>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <!-- Core -->
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/ui.js"></script>
    <script src="assets/js/core/utils.js"></script>
    <script src="assets/js/core/validators.js"></script>

    <!-- Shell -->
    <script src="assets/js/components/sidebar.js"></script>
    <script src="assets/js/components/navbar.js"></script>

    <!-- Page-specific -->
    <script src="assets/js/pages/userForm.js"></script>
    <script src="assets/js/pages/users.js"></script>

    <!-- Init -->
    <script>
        (function() {
            guardPage(["admin"]);
            renderAppShell({ activeKey: "users", pageTitle: "Instructors" });
            initUsersPage();
        })();
    </script>
</body>
</html>
