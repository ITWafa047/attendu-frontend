<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groups · AttendU</title>

    <!-- Base + Layout -->
    <link rel="stylesheet" href="assets/css/base/reset.css" />
    <link rel="stylesheet" href="assets/css/base/variables.css" />
    <link rel="stylesheet" href="assets/css/base/typography.css" />
    <link rel="stylesheet" href="assets/css/layout/layout.css" />
    <link rel="stylesheet" href="assets/css/layout/sidebar.css" />
    <link rel="stylesheet" href="assets/css/layout/navbar.css" />

    <!-- Components -->
    <link rel="stylesheet" href="assets/css/components/buttons.css" />
    <link rel="stylesheet" href="assets/css/components/forms.css" />
    <link rel="stylesheet" href="assets/css/components/toast.css" />
    <link rel="stylesheet" href="assets/css/components/loader.css" />
    <link rel="stylesheet" href="assets/css/components/tables.css" />
    <link rel="stylesheet" href="assets/css/components/pagination.css" />
    <link rel="stylesheet" href="assets/css/components/modals.css" />
    <link rel="stylesheet" href="assets/css/components/badges.css" />

    <!-- Page -->
    <link rel="stylesheet" href="assets/css/pages/courses-groups.css" />
</head>
<body>

    <div class="app-shell">
        <div id="sidebar"></div>

        <div class="app-main">
            <div id="navbar"></div>

            <div class="app-content">
                <div class="groups-page-header">
                    <h1>Groups</h1>
                    <button class="btn btn-primary" id="add-group-btn">+ Add Group</button>
                </div>

                <div class="groups-toolbar">
                    <div class="groups-search-wrap">
                        <input type="text" class="form-input" id="search-groups" placeholder="Search by name or code…" />
                        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="9" r="7" />
                            <path d="M14 14L19 19" />
                        </svg>
                    </div>
                    <!-- Optional: filter by course dropdown -->
                </div>

                <div id="groups-table-container"></div>
                <div id="groups-pagination-container"></div>
            </div>
        </div>
    </div>

    <!-- ====== MODALS ====== -->

    <!-- Add / Edit Group Modal -->
    <div id="group-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-lg">
            <div class="modal-header">
                <h2 class="modal-title" id="group-modal-title">Add Group</h2>
                <button class="modal-close" data-modal-close>&times;</button>
            </div>
            <div class="modal-body">
                <form id="group-form" novalidate>
                    <div class="group-form-grid">
                        <div class="form-group full-width">
                            <label class="form-label" for="group-name">Group Name <span class="text-muted">*</span></label>
                            <input type="text" class="form-input" id="group-name" placeholder="e.g. Section A" required />
                            <div class="form-error" id="group-name-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="group-code">Group Code</label>
                            <input type="text" class="form-input" id="group-code" placeholder="e.g. G-01" />
                            <div class="form-error" id="group-code-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="group-academic-year">Academic Year <span class="text-muted">*</span></label>
                            <select class="form-select" id="group-academic-year" required>
                                <option value="">Select an academic year…</option>
                                <option value="first">First</option>
                                <option value="second">Second</option>
                                <option value="third">Third</option>
                                <option value="fourth">Fourth</option>
                            </select>
                            <div class="form-error" id="group-academic-year-error"></div>
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label" for="group-course-id">Course <span class="text-muted">*</span></label>
                            <select class="form-select" id="group-course-id" required>
                                <option value="">Select a course…</option>
                            </select>
                            <div class="form-error" id="group-course-id-error"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-primary" id="group-save-btn">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-group-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-sm">
            <div class="modal-header">
                <h2 class="modal-title">Delete Group</h2>
                <button class="modal-close" data-modal-close>&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete the group <strong id="delete-group-name"></strong>?</p>
                <p class="text-muted" style="font-size:0.9rem;">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-danger" id="confirm-delete-group">Delete</button>
            </div>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <!-- Core -->
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/ui.js"></script>
    <script src="assets/js/core/utils.js"></script>
    <script src="assets/js/core/validators.js"></script>

    <!-- Shell -->
    <script src="assets/js/components/sidebar.js"></script>
    <script src="assets/js/components/navbar.js"></script>

    <!-- Page-specific -->
    <script src="assets/js/pages/groupForm.js"></script>
    <script src="assets/js/pages/groups.js"></script>

    <!-- Init -->
    <script>
        (function() {
            guardPage(["admin"]);
            renderAppShell({ activeKey: "groups", pageTitle: "Groups" });
            initGroupsPage();
        })();
    </script>
</body>
</html>
