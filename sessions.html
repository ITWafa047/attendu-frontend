<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sessions · AttendU</title>

    <!-- Base + Layout -->
    <link rel="stylesheet" href="assets/css/base/reset.css" />
    <link rel="stylesheet" href="assets/css/base/variables.css" />
    <link rel="stylesheet" href="assets/css/base/typography.css" />
    <link rel="stylesheet" href="assets/css/layout/layout.css" />
    <link rel="stylesheet" href="assets/css/layout/sidebar.css" />
    <link rel="stylesheet" href="assets/css/layout/navbar.css" />

    <!-- Components -->
    <link rel="stylesheet" href="assets/css/components/buttons.css" />
    <link rel="stylesheet" href="assets/css/components/forms.css" />
    <link rel="stylesheet" href="assets/css/components/toast.css" />
    <link rel="stylesheet" href="assets/css/components/loader.css" />
    <link rel="stylesheet" href="assets/css/components/tables.css" />
    <link rel="stylesheet" href="assets/css/components/pagination.css" />
    <link rel="stylesheet" href="assets/css/components/modals.css" />
    <link rel="stylesheet" href="assets/css/components/badges.css" />

    <!-- Shared page styles (toolbar, grid) -->
    <link rel="stylesheet" href="assets/css/pages/courses-groups.css" />

    <!-- Page-specific -->
    <link rel="stylesheet" href="assets/css/pages/sessions.css" />
</head>
<body>

    <div class="app-shell">
        <div id="sidebar"></div>

        <div class="app-main">
            <div id="navbar"></div>

            <div class="app-content">
                <div class="sessions-page-header">
                    <h1>Sessions</h1>
                    <button class="btn btn-primary" id="add-session-btn">+ Add Session</button>
                </div>

                <div class="sessions-toolbar">
                    <div class="sessions-search-wrap">
                        <input type="text" class="form-input" id="search-sessions" placeholder="Search by title or course…" />
                        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="9" r="7" />
                            <path d="M14 14L19 19" />
                        </svg>
                    </div>
                    <!-- Optional filters: course, group, status can be added later -->
                </div>

                <div id="sessions-table-container"></div>
                <div id="sessions-pagination-container"></div>
            </div>
        </div>
    </div>

    <!-- ====== MODALS ====== -->

    <!-- Add / Edit Session Modal -->
    <div id="session-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-lg">
            <div class="modal-header">
                <h2 class="modal-title" id="session-modal-title">Add Session</h2>
                <button class="modal-close" data-modal-close>&times;</button>
            </div>
            <div class="modal-body">
                <form id="session-form" novalidate>
                    <div class="session-form-grid">
                        <div class="form-group full-width">
                            <label class="form-label" for="session-title">Session Title</label>
                            <input type="text" class="form-input" id="session-title" placeholder="e.g. Midterm Review" />
                            <div class="form-error" id="session-title-error"></div>
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label" for="session-description">Description</label>
                            <textarea class="form-textarea" id="session-description" rows="2" placeholder="Optional notes…"></textarea>
                            <div class="form-error" id="session-description-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="session-course-id">Course <span class="text-muted">*</span></label>
                            <select class="form-select" id="session-course-id" required>
                                <option value="">Select a course…</option>
                            </select>
                            <div class="form-error" id="session-course-id-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="session-group-id">Group <span class="text-muted">*</span></label>
                            <select class="form-select" id="session-group-id" required>
                                <option value="">Select a group…</option>
                            </select>
                            <div class="form-error" id="session-group-id-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="session-instructor-id">Instructor <span class="text-muted">*</span></label>
                            <select class="form-select" id="session-instructor-id" required>
                                <option value="">Select an instructor…</option>
                            </select>
                            <div class="form-error" id="session-instructor-id-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="session-status">Status</label>
                            <select class="form-select" id="session-status">
                                <option value="scheduled">Scheduled</option>
                                <option value="ongoing">Ongoing</option>
                                <option value="completed">Completed</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                            <div class="form-error" id="session-status-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="session-start">Start Date &amp; Time <span class="text-muted">*</span></label>
                            <input type="datetime-local" class="form-input" id="session-start" required />
                            <div class="form-error" id="session-start-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="session-end">End Date &amp; Time <span class="text-muted">*</span></label>
                            <input type="datetime-local" class="form-input" id="session-end" required />
                            <div class="form-error" id="session-end-error"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-primary" id="session-save-btn">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-session-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-sm">
            <div class="modal-header">
                <h2 class="modal-title">Delete Session</h2>
                <button class="modal-close" data-modal-close>&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete the session <strong id="delete-session-title"></strong>?</p>
                <p class="text-muted" style="font-size:0.9rem;">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-danger" id="confirm-delete-session">Delete</button>
            </div>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <!-- Core -->
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/ui.js"></script>
    <script src="assets/js/core/utils.js"></script>
    <script src="assets/js/core/validators.js"></script>

    <!-- Shell -->
    <script src="assets/js/components/sidebar.js"></script>
    <script src="assets/js/components/navbar.js"></script>

    <!-- Page-specific -->
    <script src="assets/js/pages/sessionForm.js"></script>
    <script src="assets/js/pages/sessions.js"></script>

    <!-- Init -->
    <script>
        (function() {
            // Both admin and instructor can access Sessions
            guardPage(["admin", "instructor"]);
            renderAppShell({ activeKey: "sessions", pageTitle: "Sessions" });
            initSessionsPage();
        })();
    </script>
</body>
</html>
