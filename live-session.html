<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Session · AttendU</title>

    <!-- Base + Layout -->
    <link rel="stylesheet" href="assets/css/base/reset.css" />
    <link rel="stylesheet" href="assets/css/base/variables.css" />
    <link rel="stylesheet" href="assets/css/base/typography.css" />
    <link rel="stylesheet" href="assets/css/layout/layout.css" />
    <link rel="stylesheet" href="assets/css/layout/sidebar.css" />
    <link rel="stylesheet" href="assets/css/layout/navbar.css" />

    <!-- Components -->
    <link rel="stylesheet" href="assets/css/components/buttons.css" />
    <link rel="stylesheet" href="assets/css/components/forms.css" />
    <link rel="stylesheet" href="assets/css/components/toast.css" />
    <link rel="stylesheet" href="assets/css/components/loader.css" />
    <link rel="stylesheet" href="assets/css/components/tables.css" />
    <link rel="stylesheet" href="assets/css/components/modals.css" />
    <link rel="stylesheet" href="assets/css/components/badges.css" />

    <!-- Page -->
    <link rel="stylesheet" href="assets/css/pages/live-session.css" />
</head>
<body>

    <div class="app-shell">
        <div id="sidebar"></div>
        <div class="app-main">
            <div id="navbar"></div>
            <div class="app-content live-session-page">

                <!-- Session Header -->
                <div class="live-session-header" id="live-session-header">
                    <div class="session-meta">
                        <h2 id="session-title">Loading session…</h2>
                        <div class="course-group" id="session-course-group"></div>
                        <div class="instructor" id="session-instructor"></div>
                    </div>
                    <div class="timer" id="session-timer">--:--:--</div>
                </div>

                <!-- Summary Stats -->
                <div class="live-session-summary" id="live-summary">
                    <div class="stat-card total">
                        <span class="stat-number" id="stat-total">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="stat-card present">
                        <span class="stat-number" id="stat-present">0</span>
                        <span class="stat-label">Present</span>
                    </div>
                    <div class="stat-card late">
                        <span class="stat-number" id="stat-late">0</span>
                        <span class="stat-label">Late</span>
                    </div>
                    <div class="stat-card absent">
                        <span class="stat-number" id="stat-absent">0</span>
                        <span class="stat-label">Absent</span>
                    </div>
                    <div class="stat-card not-recorded">
                        <span class="stat-number" id="stat-not-recorded">0</span>
                        <span class="stat-label">Not Recorded</span>
                    </div>
                </div>

                <!-- Attendance Table -->
                <div class="live-session-table-container">
                    <div class="table-wrapper">
                        <table class="table" id="live-attendance-table">
                            <thead>
                                <tr>
                                    <th>Student Code</th>
                                    <th>Name</th>
                                    <th>Status</th>
                                    <th>Confidence</th>
                                    <th>Recorded At</th>
                                </tr>
                            </thead>
                            <tbody id="live-attendance-tbody">
                                <!-- rows inserted by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Actions -->
                <div class="live-session-actions">
                    <button class="btn btn-danger" id="end-session-btn">End Session</button>
                </div>

                <!-- Hidden video element for webcam capture -->
                <video id="webcam-video" autoplay playsinline></video>
                <canvas id="webcam-canvas" style="display:none;"></canvas>
            </div>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <!-- Core -->
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/ui.js"></script>
    <script src="assets/js/core/utils.js"></script>
    <script src="assets/js/core/validators.js"></script>

    <!-- Shell -->
    <script src="assets/js/components/sidebar.js"></script>
    <script src="assets/js/components/navbar.js"></script>

    <!-- Page-specific -->
    <script src="assets/js/pages/liveSession.js"></script>

    <!-- Init -->
    <script>
        (function() {
            guardPage(["admin", "instructor"]);
            renderAppShell({ activeKey: "sessions", pageTitle: "Live Session" });
            initLiveSessionPage();
        })();
    </script>
</body>
</html>
