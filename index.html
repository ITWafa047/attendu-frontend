<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AttendU</title>

    <!-- Minimal loading style -->
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg, #F7F8FA);
            font-family: "Inter", sans-serif;
        }
        .loader {
            text-align: center;
            color: var(--muted, #667085);
        }
        .loader .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 4px solid var(--border, #E4E7EC);
            border-top-color: var(--primary, #1E3A8A);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader p {
            margin: 0;
            font-size: 0.95rem;
        }
    </style>

    <!-- Core scripts (only need storage + auth to check login state) -->
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/auth.js"></script>
</head>
<body>

    <div class="loader">
        <div class="spinner"></div>
        <p>Loading AttendU…</p>
    </div>

    <script>
        (function() {
            // Small delay to ensure the spinner renders, then redirect instantly
            // Use requestAnimationFrame or a micro-task to avoid flashing.
            requestAnimationFrame(() => {
                if (isLoggedIn()) {
                    window.location.href = "dashboard.html";
                } else {
                    window.location.href = "login.html";
                }
            });
        })();
    </script>
</body>
</html>
