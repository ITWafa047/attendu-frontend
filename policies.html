<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Policies · AttendU</title>

    <!-- Base + Layout -->
    <link rel="stylesheet" href="assets/css/base/reset.css" />
    <link rel="stylesheet" href="assets/css/base/variables.css" />
    <link rel="stylesheet" href="assets/css/base/typography.css" />
    <link rel="stylesheet" href="assets/css/layout/layout.css" />
    <link rel="stylesheet" href="assets/css/layout/sidebar.css" />
    <link rel="stylesheet" href="assets/css/layout/navbar.css" />

    <!-- Components -->
    <link rel="stylesheet" href="assets/css/components/buttons.css" />
    <link rel="stylesheet" href="assets/css/components/forms.css" />
    <link rel="stylesheet" href="assets/css/components/toast.css" />
    <link rel="stylesheet" href="assets/css/components/loader.css" />
    <link rel="stylesheet" href="assets/css/components/tables.css" />
    <link rel="stylesheet" href="assets/css/components/pagination.css" />
    <link rel="stylesheet" href="assets/css/components/modals.css" />
    <link rel="stylesheet" href="assets/css/components/badges.css" />

    <!-- Shared page styles (toolbar, grid) -->
    <link rel="stylesheet" href="assets/css/pages/courses-groups.css" />

    <!-- Page-specific -->
    <link rel="stylesheet" href="assets/css/pages/policies.css" />
</head>
<body>

    <div class="app-shell">
        <div id="sidebar"></div>

        <div class="app-main">
            <div id="navbar"></div>

            <div class="app-content">
                <div class="policies-page-header">
                    <h1>Attendance Policies</h1>
                    <button class="btn btn-primary" id="add-policy-btn">+ Add Policy</button>
                </div>

                <div class="policies-toolbar">
                    <div class="policies-search-wrap">
                        <input type="text" class="form-input" id="search-policies" placeholder="Search by name…" />
                        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="9" r="7" />
                            <path d="M14 14L19 19" />
                        </svg>
                    </div>
                </div>

                <div id="policies-table-container"></div>
                <div id="policies-pagination-container"></div>
            </div>
        </div>
    </div>

    <!-- ====== MODALS ====== -->

    <!-- Add / Edit Policy Modal -->
    <div id="policy-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-lg">
            <div class="modal-header">
                <h2 class="modal-title" id="policy-modal-title">Add Policy</h2>
                <button class="modal-close" data-modal-close>&times;</button>
            </div>
            <div class="modal-body">
                <form id="policy-form" novalidate>
                    <div class="policy-form-grid">
                        <div class="form-group full-width">
                            <label class="form-label" for="policy-course-id">Course <span class="text-muted">*</span></label>
                            <select class="form-select" id="policy-course-id" required>
                                <option value="">Select a course</option>
                            </select>
                            <div class="form-error" id="policy-course-id-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="policy-max-absences">Max Absences Allowed <span class="text-muted">*</span></label>
                            <input type="number" class="form-input" id="policy-max-absences" placeholder="e.g. 3" min="0" required />
                            <div class="form-error" id="policy-max-absences-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="policy-min-attend">Minimum Attend <span class="text-muted">*</span></label>
                            <input type="number" class="form-input" id="policy-min-attend" placeholder="e.g. 75" min="0" required />
                            <div class="form-error" id="policy-min-attend-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="policy-max-attend">Maximum Attend <span class="text-muted">*</span></label>
                            <input type="number" class="form-input" id="policy-max-attend" placeholder="e.g. 100" min="0" required />
                            <div class="form-error" id="policy-max-attend-error"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-primary" id="policy-save-btn">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-policy-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-sm">
            <div class="modal-header">
                <h2 class="modal-title">Delete Policy</h2>
                <button class="modal-close" data-modal-close>&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete the policy <strong id="delete-policy-name"></strong>?</p>
                <p class="text-muted" style="font-size:0.9rem;">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-danger" id="confirm-delete-policy">Delete</button>
            </div>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <!-- Core -->
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/ui.js"></script>
    <script src="assets/js/core/utils.js"></script>
    <script src="assets/js/core/validators.js"></script>

    <!-- Shell -->
    <script src="assets/js/components/sidebar.js"></script>
    <script src="assets/js/components/navbar.js"></script>

    <!-- Page-specific -->
    <script src="assets/js/pages/policyForm.js"></script>
    <script src="assets/js/pages/policies.js"></script>

    <!-- Init -->
    <script>
        (function() {
            guardPage(["admin"]);
            renderAppShell({ activeKey: "policies", pageTitle: "Attendance Policies" });
            initPoliciesPage();
        })();
    </script>
</body>
</html>
