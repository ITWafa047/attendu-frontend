<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Report · AttendU</title>

    <!-- Base + Layout -->
    <link rel="stylesheet" href="assets/css/base/reset.css" />
    <link rel="stylesheet" href="assets/css/base/variables.css" />
    <link rel="stylesheet" href="assets/css/base/typography.css" />
    <link rel="stylesheet" href="assets/css/layout/layout.css" />
    <link rel="stylesheet" href="assets/css/layout/sidebar.css" />
    <link rel="stylesheet" href="assets/css/layout/navbar.css" />

    <!-- Components -->
    <link rel="stylesheet" href="assets/css/components/buttons.css" />
    <link rel="stylesheet" href="assets/css/components/forms.css" />
    <link rel="stylesheet" href="assets/css/components/toast.css" />
    <link rel="stylesheet" href="assets/css/components/loader.css" />
    <link rel="stylesheet" href="assets/css/components/tables.css" />
    <link rel="stylesheet" href="assets/css/components/pagination.css" />
    <link rel="stylesheet" href="assets/css/components/modals.css" />
    <link rel="stylesheet" href="assets/css/components/badges.css" />

    <!-- Page-specific -->
    <link rel="stylesheet" href="assets/css/pages/reports.css" />
</head>
<body>

    <div class="app-shell">
        <div id="sidebar"></div>

        <div class="app-main">
            <div id="navbar"></div>

            <div class="app-content">
                <div class="report-detail-header">
                    <h1 id="report-student-name">Student Report</h1>
                    <a href="reports.html" class="btn btn-secondary">← Back to Reports</a>
                </div>

                <!-- Student Info -->
                <div class="report-detail-student-info" id="report-student-info">
                    <div class="info-grid">
                        <div class="info-item"><strong>Student Code:</strong> <span id="student-code">—</span></div>
                        <div class="info-item"><strong>Email:</strong> <span id="student-email">—</span></div>
                        <div class="info-item"><strong>Phone:</strong> <span id="student-phone">—</span></div>
                        <div class="info-item"><strong>Gender:</strong> <span id="student-gender">—</span></div>
                        <div class="info-item"><strong>National ID:</strong> <span id="student-national-id">—</span></div>
                    </div>
                </div>

                <!-- Summary Cards -->
                <div class="report-detail-summary" id="report-detail-summary">
                    <div class="stat-card total">
                        <span class="stat-number" id="detail-total">0</span>
                        <span class="stat-label">Total Sessions</span>
                    </div>
                    <div class="stat-card present">
                        <span class="stat-number" id="detail-present">0</span>
                        <span class="stat-label">Present</span>
                    </div>
                    <div class="stat-card late">
                        <span class="stat-number" id="detail-late">0</span>
                        <span class="stat-label">Late</span>
                    </div>
                    <div class="stat-card absent">
                        <span class="stat-number" id="detail-absent">0</span>
                        <span class="stat-label">Absent</span>
                    </div>
                </div>

                <!-- Sessions Table -->
                <div class="report-detail-sessions">
                    <div class="table-wrapper">
                        <table class="table" id="report-sessions-table">
                            <thead>
                                <tr>
                                    <th>Session Title</th>
                                    <th>Course</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="report-sessions-tbody">
                                <!-- Rows inserted by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <!-- Core -->
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/ui.js"></script>
    <script src="assets/js/core/utils.js"></script>
    <script src="assets/js/core/validators.js"></script>

    <!-- Shell -->
    <script src="assets/js/components/sidebar.js"></script>
    <script src="assets/js/components/navbar.js"></script>

    <!-- Page-specific -->
    <script src="assets/js/pages/reportDetail.js"></script>

    <!-- Init -->
    <script>
        (function() {
            guardPage(["admin"]);
            renderAppShell({ activeKey: "reports", pageTitle: "Student Report" });
            initReportDetailPage();
        })();
    </script>
</body>
</html>
