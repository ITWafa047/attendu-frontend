<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courses · AttendU</title>

    <!-- Base + Layout -->
    <link rel="stylesheet" href="assets/css/base/reset.css" />
    <link rel="stylesheet" href="assets/css/base/variables.css" />
    <link rel="stylesheet" href="assets/css/base/typography.css" />
    <link rel="stylesheet" href="assets/css/layout/layout.css" />
    <link rel="stylesheet" href="assets/css/layout/sidebar.css" />
    <link rel="stylesheet" href="assets/css/layout/navbar.css" />

    <!-- Components -->
    <link rel="stylesheet" href="assets/css/components/buttons.css" />
    <link rel="stylesheet" href="assets/css/components/forms.css" />
    <link rel="stylesheet" href="assets/css/components/toast.css" />
    <link rel="stylesheet" href="assets/css/components/loader.css" />
    <link rel="stylesheet" href="assets/css/components/tables.css" />
    <link rel="stylesheet" href="assets/css/components/pagination.css" />
    <link rel="stylesheet" href="assets/css/components/modals.css" />
    <link rel="stylesheet" href="assets/css/components/badges.css" />

    <!-- Page -->
    <link rel="stylesheet" href="assets/css/pages/courses-groups.css" />
</head>
<body>

    <div class="app-shell">
        <!-- Sidebar injected here -->
        <div id="sidebar"></div>

        <div class="app-main">
            <!-- Navbar injected here -->
            <div id="navbar"></div>

            <!-- Page content -->
            <div class="app-content">
                <div class="courses-page-header">
                    <h1>Courses</h1>
                    <button class="btn btn-primary" id="add-course-btn">+ Add Course</button>
                </div>

                <div class="courses-toolbar">
                    <div class="courses-search-wrap">
                        <input type="text" class="form-input" id="search-courses" placeholder="Search by name or code…" />
                        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="9" r="7" />
                            <path d="M14 14L19 19" />
                        </svg>
                    </div>
                    <!-- No filter dropdown for courses, but can be added later -->
                </div>

                <!-- Table -->
                <div id="courses-table-container">
                    <!-- rendered by courses.js -->
                </div>

                <!-- Pagination -->
                <div id="courses-pagination-container">
                    <!-- rendered by courses.js -->
                </div>
            </div>
        </div>
    </div>

    <!-- ====== MODALS ====== -->

    <!-- Add / Edit Course Modal -->
    <div id="course-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-lg">
            <div class="modal-header">
                <h2 class="modal-title" id="course-modal-title">Add Course</h2>
                <button class="modal-close" data-modal-close aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="course-form" novalidate>
                    <div class="course-form-grid">
                        <div class="form-group full-width">
                            <label class="form-label" for="course-name">Course Name <span class="text-muted">*</span></label>
                            <input type="text" class="form-input" id="course-name" placeholder="e.g. Advanced Database Systems" required />
                            <div class="form-error" id="course-name-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="course-code">Course Code</label>
                            <input type="text" class="form-input" id="course-code" placeholder="e.g. CS-401" />
                            <div class="form-error" id="course-code-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="course-description">Description</label>
                            <textarea class="form-textarea" id="course-description" rows="3" placeholder="Brief description…"></textarea>
                            <div class="form-error" id="course-description-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="course-start-date">Start Date</label>
                            <input type="date" class="form-input" id="course-start-date" />
                            <div class="form-error" id="course-start-date-error"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="course-end-date">End Date</label>
                            <input type="date" class="form-input" id="course-end-date" />
                            <div class="form-error" id="course-end-date-error"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-primary" id="course-save-btn">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-course-modal" class="modal">
        <div class="modal-overlay" data-modal-close></div>
        <div class="modal-box modal-box-sm">
            <div class="modal-header">
                <h2 class="modal-title">Delete Course</h2>
                <button class="modal-close" data-modal-close>&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete the course <strong id="delete-course-name"></strong>?</p>
                <p class="text-muted" style="font-size:0.9rem;">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-modal-close>Cancel</button>
                <button class="btn btn-danger" id="confirm-delete-course">Delete</button>
            </div>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <!-- Core (dependency order) -->
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/ui.js"></script>
    <script src="assets/js/core/utils.js"></script>
    <script src="assets/js/core/validators.js"></script>

    <!-- Shell -->
    <script src="assets/js/components/sidebar.js"></script>
    <script src="assets/js/components/navbar.js"></script>

    <!-- Page-specific -->
    <script src="assets/js/pages/courseForm.js"></script>
    <script src="assets/js/pages/courses.js"></script>

    <!-- Init -->
    <script>
        (function() {
            guardPage(["admin"]);
            renderAppShell({ activeKey: "courses", pageTitle: "Courses" });
            initCoursesPage();
        })();
    </script>
</body>
</html>
